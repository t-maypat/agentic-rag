# Serve the SPA and proxy /api to the backend service (docker-compose network).
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API calls to the backend container. No trailing slash on proxy_pass
    # so the full "/api/..." path is forwarded unchanged.
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSE: disable buffering and keep long-lived streams open.
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        chunked_transfer_encoding on;
    }

    # SPA fallback: unknown routes serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
