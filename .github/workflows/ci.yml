name: CI

# TEMPORARILY DISABLED: manual-only. To re-enable automatic runs, restore:
#   push:
#     branches: [main]
#   pull_request:
on:
  workflow_dispatch: {}

defaults:
  run:
    working-directory: backend

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run pyright

  test:
    runs-on: ubuntu-latest
    env:
      # settings construction requires a key; no network is touched in unit tests.
      GEMINI_API_KEY: ci-not-used
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
      - run: uv sync --extra dev
      # pytest-socket disables network (configured in pyproject addopts).
      - run: uv run pytest -q

  eval-retrieval:
    runs-on: ubuntu-latest
    env:
      # Deterministic offline eval: local numpy store + BM25 + fusion, no network.
      # A key is only needed so app.core.config validates; nothing calls Gemini.
      GEMINI_API_KEY: ci-not-used
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run python scripts/run_retrieval_eval.py
